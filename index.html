<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VisionPanel | World Monitor</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 15px; width: 250px; text-align: center; }
        .flag { font-size: 3em; margin-bottom: 10px; }
        .city { font-size: 1.5em; font-weight: bold; margin-bottom: 10px; color: #00d4ff; }
        .time { font-size: 2em; margin-bottom: 5px; }
        .weather { color: #aaa; }
    </style>
</head>
<body>

    <div class="card">
        <div class="flag">🇹🇷</div>
        <div class="city">İstanbul</div>
        <div class="time" id="time-tr">--:--:--</div>
        <div class="weather">20°C Bulutlu</div>
    </div>

    <div class="card">
        <div class="flag">🇺🇸</div>
        <div class="city">New York</div>
        <div class="time" id="time-us">--:--:--</div>
        <div class="weather">18°C Güneşli</div>
    </div>

    <div class="card">
        <div class="flag">🇯🇵</div>
        <div class="city">Tokyo</div>
        <div class="time" id="time-jp">--:--:--</div>
        <div class="weather">24°C Yağmurlu</div>
    </div>

    <script>
        function updateClocks() {
            document.getElementById('time-tr').innerText = new Date().toLocaleTimeString('tr-TR', {timeZone: 'Europe/Istanbul'});
            document.getElementById('time-us').innerText = new Date().toLocaleTimeString('tr-TR', {timeZone: 'America/New_York'});
            document.getElementById('time-jp').innerText = new Date().toLocaleTimeString('tr-TR', {timeZone: 'Asia/Tokyo'});
        }
        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
