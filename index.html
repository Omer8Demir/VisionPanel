<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VisionPanel | Premium Terminal</title>
    <style>
        body { margin: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .hero { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; }
        .clock-box { font-size: 2.5em; font-weight: bold; text-shadow: 0 0 20px rgba(0,212,255,0.5); }
        
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; width: 90%; max-width: 1000px; }
        .btn { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 20px; color: #fff; text-align: center; text-decoration: none; border-radius: 12px; transition: 0.4s; }
        .btn:hover { background: #00d4ff; box-shadow: 0 0 20px #00d4ff; border-color: #fff; }

        .ticker-bar { height: 70px; background: rgba(200, 0, 0, 0.9); display: flex; align-items: center; border-top: 3px solid #fff; overflow: hidden; font-size: 1.4em; font-weight: bold; }
        #ticker { animation: move 20s linear infinite; }
        @keyframes move { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="hero">
        <div class="clock-box" id="saatler">Yükleniyor...</div>
        <div class="nav-grid">
            <a href="https://x.com" class="btn">X (Twitter)</a>
            <a href="https://instagram.com" class="btn">Instagram</a>
            <a href="https://telegram.org" class="btn">Telegram</a>
            <a href="https://binance.com" class="btn">CEX (Binance)</a>
            <a href="https://uniswap.org" class="btn">DEX (Uniswap)</a>
        </div>
    </div>

    <div class="ticker-bar">
        <div id="ticker"></div>
    </div>

    <script>
        function updateTime() {
            document.getElementById('saatler').innerHTML = 
                `İstanbul: ${new Date().toLocaleTimeString('tr-TR', {timeZone: 'Europe/Istanbul'})}<br>` +
                `New York: ${new Date().toLocaleTimeString('tr-TR', {timeZone: 'America/New_York'})}<br>` +
                `Tokyo: ${new Date().toLocaleTimeString('tr-TR', {timeZone: 'Asia/Tokyo'})}`;
        }
        setInterval(updateTime, 1000);

        async function fetchCrypto() {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price');
            const data = await res.json();
            const filter = data.filter(i => ['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'XRPUSDT'].includes(i.symbol));
            document.getElementById('ticker').innerText = filter.map(i => `${i.symbol.replace('USDT','')}: $${parseFloat(i.price).toFixed(2)}`).join(' | ');
        }
        setInterval(fetchCrypto, 3000);
        fetchCrypto();
    </script>
</body>
</html>
