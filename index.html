<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Global Veri Terminali</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        
        /* En Üstteki Kontrol Paneli */
        .top-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #00d4ff; text-align: center; width: 300px; }
        .donation-text { color: #00d4ff; font-size: 0.8em; margin-bottom: 10px; font-weight: bold; }
        .btn-list { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 10px; }
        .btn-list a { font-size: 0.7em; padding: 4px 8px; background: #222; color: #fff; text-decoration: none; border: 1px solid #444; border-radius: 4px; }
        .btn-list a:hover { background: #00d4ff; color: #000; }

        /* Arama ve Liste Kısmı */
        .search-box { width: 100%; max-width: 600px; padding: 15px; border-radius: 10px; border: 2px solid #00d4ff; background: #111; color: #fff; font-size: 1.2em; display: block; margin: 20px auto; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        h3 { color: #00d4ff; margin: 0; }
        .data { font-size: 0.85em; color: #ccc; margin: 2px 0; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">Global Veri Terminali (195 Ülke)</h1>
    
    <!-- En Üst Bölüm: Bağış ve Borsalar -->
    <div class="top-container">
        <div class="box">
            <p class="donation-text">Support stray animals.</p>
            <a href="https://nowpayments.io/donation?api_key=b7e0cf29-c2e0-48da-8a6e-225bf1b5fdcd" target="_blank" style="color: #00d4ff; text-decoration: underline; font-size: 0.9em;">Donate Here</a>
        </div>
        <div class="box">
            <p class="donation-text">CEX Exchanges</p>
            <div class="btn-list">
                <a href="https://www.binance.com" target="_blank">Binance</a><a href="https://www.coinbase.com" target="_blank">Coinbase</a><a href="https://www.okx.com" target="_blank">OKX</a>
                <a href="https://www.kraken.com" target="_blank">Kraken</a><a href="https://www.bybit.com" target="_blank">Bybit</a><a href="https://www.kucoin.com" target="_blank">KuCoin</a>
                <a href="https://www.gate.io" target="_blank">Gate.io</a><a href="https://www.mexc.com" target="_blank">MEXC</a><a href="https://www.bitget.com" target="_blank">Bitget</a>
            </div>
            <p class="donation-text" style="margin-top:10px;">DEX Exchanges</p>
            <div class="btn-list">
                <a href="https://uniswap.org" target="_blank">Uniswap</a><a href="https://pancakeswap.finance" target="_blank">PancakeSwap</a><a href="https://curve.fi" target="_blank">Curve</a>
                <a href="https://sushi.com" target="_blank">SushiSwap</a><a href="https://balancer.fi" target="_blank">Balancer</a><a href="https://raydium.io" target="_blank">Raydium</a>
            </div>
        </div>
    </div>

    <!-- Alt Kısım: Arama ve Liste -->
    <input type="text" class="search-box" id="arama" placeholder="Ülke ara..." oninput="filtrele()">
    <div class="grid" id="liste"></div>

    <script>
        const ulkeler = [
            {n: "Hindistan", nf: "1.476.625.576", p: "17,79%", a: "2.973.190"}, {n: "Çin", nf: "1.412.914.089", p: "17,02%", a: "9.388.211"},
            /* Diğer verileriniz burada aynen kalacak */
        ];

        function filtrele() {
            const aranan = document.getElementById('arama').value.toLowerCase();
            const liste = document.getElementById('liste');
            liste.innerHTML = '';
            ulkeler.filter(u => u.n.toLowerCase().includes(aranan)).forEach(u => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h3>${u.n}</h3><p class="data">Nüfus: ${u.nf}</p><p class="data">Dünya Payı: ${u.p}</p><p class="data">Yüzölçümü: ${u.a} km²</p>`;
                liste.appendChild(div);
            });
        }
        filtrele();
    </script>
</body>
</html>
