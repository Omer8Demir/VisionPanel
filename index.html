<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VisionPanel - Canlı Terminal</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border: 2px solid #00d4ff; border-radius: 10px; background: #111; margin-bottom: 20px; }
        .donate-btn { background: #ff00ff; color: #fff; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .card { background: #111; border: 1px solid #444; padding: 20px; border-radius: 15px; }
        h2 { color: #00d4ff; text-align: center; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h2 style="margin:0;">Global Veri Terminali v2.0</h2>
        <a href="https://nowpayments.io/donation?api_key=b7e0cf29-c2e0-48da-8a6e-225bf1b5fdcd" target="_blank" class="donate-btn">BAĞIŞ YAP</a>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>Canlı Kripto Piyasa Fiyatları</h2>
            <div class="tradingview-widget-container">
                <iframe src="https://s.tradingview.com/embed-widget/ticker-tape/?locale=tr_TR#%7B%22symbols%22%3A%5B%7B%22proName%22%3A%22BITSTAMP%3ABTCUSD%22%2C%22title%22%3A%22Bitcoin%22%7D%2C%7B%22proName%22%3A%22BITSTAMP%3AETHUSD%22%2C%22title%22%3A%22Ethereum%22%7D%2C%7B%22description%22%3A%22ONDO%22%2C%22proName%22%3A%22COINBASE%3AONDOUSD%22%7D%2C%7B%22description%22%3A%22TIA%22%2C%22proName%22%3A%22BINANCE%3ATIAUSDT%22%7D%2C%7B%22description%22%3A%22ZEC%22%2C%22proName%22%3A%22BINANCE%3AZECUSDT%22%7D%5D%2C%22showSymbolLogo%22%3Atrue%2C%22isTransparent%22%3Atrue%2C%22displayMode%22%3A%22adaptive%22%2C%22colorTheme%22%3A%22dark%22%7D" style="width:100%; height:300px; border:none;"></iframe>
            </div>
        </div>

        <div class="card">
            <h2>Piyasa Haberleri</h2>
            <iframe src="https://cryptopanic.com/widgets/news/?color=dark&bg_color=111111&text_color=ffffff" style="width:100%; height:300px; border:none;"></iframe>
        </div>
    </div>

</body>
</html>
