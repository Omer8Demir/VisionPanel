<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VisionPanel | Pro Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: #161616; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #00d4ff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 8px; border-bottom: 1px solid #222; }
        .live-stream { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">VisionPanel: Global Command Center</h1>
    <div class="dashboard">
        <!-- Canlı Yayın -->
        <div class="card">
            <h2>Canlı Yayın</h2>
            <div class="live-stream"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/jfKfPfyJRdk" frameborder="0" allowfullscreen></iframe></div>
        </div>
        <!-- Proje Takip Tablosu -->
        <div class="card">
            <h2>Piyasa Takibi (5'li +)</h2>
            <table>
                <tr><td>Ondo</td><td>--</td></tr>
                <tr><td>TIA</td><td>--</td></tr>
                <tr><td>Mantra (OM)</td><td>--</td></tr>
                <tr><td>io.net</td><td>--</td></tr>
                <tr><td>ZEC</td><td>--</td></tr>
                <tr><td>ZKP</td><td>--</td></tr>
                <tr><td>Monad</td><td>--</td></tr>
                <tr style="color: #ffd700;"><td><strong>AuCan Gold</strong></td><td><strong>Takipte</strong></td></tr>
            </table>
        </div>
        <!-- Hava Durumu ve Saat -->
        <div class="card">
            <h2>Global Veri</h2>
            <p>Hava Durumu: <strong>İstanbul 20°C</strong></p>
            <p>Yerel Saat: <span id="clock"></span></p>
        </div>
    </div>
    <script>setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);</script>
</body>
</html>
