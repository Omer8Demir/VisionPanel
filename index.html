<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VisionPanel | Financial News</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #000; color: #fff; margin: 0; }
        .ticker { background: #d00; padding: 10px; font-weight: bold; overflow: hidden; white-space: nowrap; }
        .nav { padding: 20px; border-bottom: 3px solid #d00; display: flex; justify-content: space-between; align-items: center; }
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 4px; border-top: 4px solid #d00; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #888; border-bottom: 1px solid #333; padding: 10px; }
        td { padding: 15px 10px; border-bottom: 1px solid #222; }
        .ad-space { height: 250px; background: #111; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="ticker">
        VISIONPANEL LIVE: Piyasalar açıldı | Kripto verileri güncellendi | Altın yeni zirvede...
    </div>
    
    <div class="nav">
        <h1 style="margin:0;">VISION<span style="color:#d00;">PANEL</span></h1>
        <div><span id="clock"></span></div>
    </div>

    <div class="main-grid">
        <div class="card">
            <h2>Piyasa Verileri (Blockchain)</h2>
            <table>
                <tr><th>Sembol</th><th>Fiyat</th><th>24s Değişim</th></tr>
                <tr><td>BTC</td><td>$68,450</td><td style="color:#0f0;">+1.2%</td></tr>
                <tr><td>ETH</td><td>$3,780</td><td style="color:#0f0;">+0.8%</td></tr>
                <tr><td>SOL</td><td>$165.20</td><td style="color:#f00;">-0.5%</td></tr>
                <tr><td>BNB</td><td>$605.10</td><td style="color:#0f0;">+2.1%</td></tr>
                <tr><td>ADA</td><td>$0.45</td><td style="color:#0f0;">+0.3%</td></tr>
            </table>
        </div>
        
        <div class="card">
            <h2>Canlı Yayın</h2>
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/jfKfPfyJRdk" frameborder="0" allowfullscreen></iframe>
            <div class="ad-space">Google Reklam Alanı</div>
        </div>
    </div>

    <script>
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
