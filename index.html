<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Global Veri Terminali</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border: 2px solid #00d4ff; border-radius: 10px; background: #111; margin-bottom: 20px; }

        .box { background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; height: 600px; }
        h2 { color: #00d4ff; text-align: center; margin-top: 0; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">Global Veri Terminali v2.0</h2>
        <a href="https://nowpayments.io/donation?api_key=b7e0cf29-c2e0-48da-8a6e-225bf1b5fdcd" target="_blank" class="donate-btn">BAĞIŞ YAP</a>
    </div>

    <div class="main-grid">
        <div class="box">
            <h2>Canlı Piyasa Fiyatları</h2>
            <iframe src="https://s.tradingview.com/embed-widget/markets/?locale=tr_TR#%7B%22width%22%3A%22100%25%22%2C%22height%22%3A%22550%22%2C%22isTransparent%22%3Atrue%2C%22colorTheme%22%3A%22dark%22%2C%22market%22%3A%22crypto%22%7D" style="width:100%; height:550px; border:none;"></iframe>
        </div>

        <div class="box">
            <h2>Güncel Piyasa Haberleri</h2>
            <iframe src="https://cryptopanic.com/widgets/news/?color=dark&bg_color=111111&text_color=ffffff&header_bg=000000" style="width:100%; height:550px; border:none;"></iframe>
        </div>
    </div>

</body>
</html>
