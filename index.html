<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VisionPanel | Global Hub</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .search-box { width: 100%; max-width: 600px; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #111; color: #fff; font-size: 1.2em; text-align: center; }
        .results { margin-top: 30px; width: 100%; max-width: 800px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; border-left: 5px solid #00d4ff; text-align: center; }
    </style>
</head>
<body>

    <h1>Dünya İzleme Merkezi</h1>
    <input type="text" class="search-box" id="arama" placeholder="Ülke ismi yaz (örn: Almanya, Fransa, Çin...)" onkeyup="filtrele()">

    <div class="results" id="liste"></div>

    <script>
        const ülkeler = [
            { ad: 'Türkiye', bayrak: '🇹🇷', saat: 'Europe/Istanbul' },
            { ad: 'Almanya', bayrak: '🇩🇪', saat: 'Europe/Berlin' },
            { ad: 'Fransa', bayrak: '🇫🇷', saat: 'Europe/Paris' },
            { ad: 'Çin', bayrak: '🇨🇳', saat: 'Asia/Shanghai' },
            { ad: 'ABD', bayrak: '🇺🇸', saat: 'America/New_York' },
            { ad: 'Japonya', bayrak: '🇯🇵', saat: 'Asia/Tokyo' },
            { ad: 'Birleşik Krallık', bayrak: '🇬🇧', saat: 'Europe/London' },
            { ad: 'Brezilya', bayrak: '🇧🇷', saat: 'America/Sao_Paulo' }
        ];

        function filtrele() {
            const aranan = document.getElementById('arama').value.toLowerCase();
            const liste = document.getElementById('liste');
            liste.innerHTML = '';
            
            ülkeler.filter(u => u.ad.toLowerCase().includes(aranan)).forEach(u => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h3>${u.bayrak} ${u.ad}</h3><p id="saat-${u.ad}">${new Date().toLocaleTimeString('tr-TR', {timeZone: u.saat})}</p>`;
                liste.appendChild(div);
            });
        }
        
        // İlk yükleme
        filtrele();
        setInterval(filtrele, 1000);
    </script>
</body>
</html>
