<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VisionPanel - Terminal</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border: 2px solid #00d4ff; border-radius: 10px; background: #111; margin-bottom: 20px; }
        .donate-btn { background: #ff00ff; color: #fff; padding: 10px 25px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .box { background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">Global Veri Terminali v2.0</h2>
        <a href="https://nowpayments.io/donation?api_key=b7e0cf29-c2e0-48da-8a6e-225bf1b5fdcd" target="_blank" class="donate-btn">BAĞIŞ YAP</a>
    </div>

    <div class="grid">
        <div class="box">
            <h2 style="color:#00d4ff; text-align:center;">Canlı Piyasa Fiyatları</h2>
            <iframe src="https://www.livecoinwatch.com/widget?fsym=BTC&tsym=USD&cryptoName=true&cryptoUrl=true" style="width:100%; height:400px; border:none;"></iframe>
        </div>

        <div class="box">
            <h2 style="color:#00d4ff; text-align:center;">Güncel Piyasa Haberleri</h2>
            <iframe src="https://cryptopanic.com/widgets/news/?color=dark&bg_color=111111&text_color=ffffff" style="width:100%; height:400px; border:none;"></iframe>
        </div>
    </div>

</body>
</html>
