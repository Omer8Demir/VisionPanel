<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Omer8Demir</title>
    <style>
        body { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); color: #ff9d00; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        header { padding: 40px; border-bottom: 3px solid #ff9d00; }
        #donation-banner { background: #2a1f00; border: 2px solid #ff9d00; padding: 15px; margin: 20px auto; color: #ff9d00; border-radius: 8px; max-width: 600px; }
        #canvas-zone { border: 5px solid #ff9d00; background: #000; width: 400px; height: 400px; margin: 30px auto; display: flex; align-items: center; justify-content: center; }
        button { background: #ff9d00; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; margin: 10px; }
    </style>
</head>
<body>
    <header>
        <div id="donation-banner">
            🐾 <b>DOSTLARIMIZA YARDIM ELİ</b> 🐾<br>
            <p>Bağışların %80'i can dostlarımıza, %20'si projeye!</p>
            <!-- Buraya kendi bağış linkini (örneğin Patreon veya Bionluk) ekleyebilirsin -->
            <button onclick="window.open('https://www.google.com', '_blank')">ŞİMDİ DESTEK OL</button>
        </div>
        <h1>OMER8DEMIR</h1>
    </header>

    <main>
        <div id="canvas-zone">
            <p id="msg">Oyun başlamak için butona tıkla.</p>
        </div>
        <button onclick="startSnake()">YILANI BAŞLAT</button>
    </main>

    <script>
        function startSnake() {
            const zone = document.getElementById('canvas-zone');
            zone.innerHTML = '<canvas id="game" width="400" height="400"></canvas>';
            const ctx = document.getElementById("game").getContext("2d");
            let x = 200, y = 200, score = 0;
            
            // Basit bir hareket döngüsü
            setInterval(() => {
                ctx.fillStyle = "#000"; ctx.fillRect(0,0,400,400);
                ctx.fillStyle = "#ff9d00"; ctx.fillRect(x, y, 20, 20);
                x += 5; if(x > 400) x = 0;
            }, 50);
        }
    </script>
</body>
</html>
