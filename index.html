        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .search-box { width: 100%; max-width: 600px; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #111; color: #00d4ff; font-size: 1.2em; text-align: center; margin-bottom: 30px; border: 2px solid #00d4ff; }
        .results { width: 100%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .card { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #00d4ff; }
        h3 { margin: 0 0 5px 0; color: #00d4ff; font-size: 1em; }
        .time { font-size: 1.2em; font-weight: bold; }
    </style>
</head>
