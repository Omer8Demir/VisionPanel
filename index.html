<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vision Panel - Global Data Terminal</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; }
        .header-panel { background: #111; padding: 20px; border-bottom: 2px solid #00d4ff; text-align: center; }
        .donation-btn { background: #00d4ff; color: #000; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .nav-buttons { text-align: center; margin: 20px 0; }
        .btn { padding: 10px 25px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .cex-btn { background: #f3ba2f; }
        .dex-btn { background: #764abc; color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        a { color: #00d4ff; text-decoration: none; font-weight: bold; }
        .search-box { width: 100%; max-width: 600px; padding: 10px; border-radius: 5px; border: 1px solid #00d4ff; background: #111; color: #fff; display: block; margin: 20px auto; text-align: center; }
    </style>
</head>
<body>

    <div class="header-panel">
        <h1>Vision Panel - Global Data Terminal</h1>
        <p>Support street animals! Every donation helps our furry friends in need.</p>
        <iframe src="https://nowpayments.io/embeds/donation-widget?api_key=b7e0cf29-c2e0-48da-8a6e-225bf1b5fdcd" width="346" height="623" frameborder="0" scrolling="no"></iframe>
    </div>

    <div class="nav-buttons">
        <button class="btn cex-btn" onclick="filterExchanges('CEX')">CEX Platforms</button>
        <button class="btn dex-btn" onclick="filterExchanges('DEX')">DEX Platforms</button>
        <button class="btn" onclick="filterExchanges('ALL')" style="background:#555; color:#fff;">All Platforms</button>
    </div>
    <div class="grid" id="exchange-list"></div>

    <h2 style="text-align:center;">Country Data</h2>
    <input type="text" class="search-box" id="arama" placeholder="Search country..." oninput="filtrele()">
    <div class="grid" id="liste"></div>

    <script>
        const exchanges = [
            {n: "Binance", type: "CEX", url: "https://www.binance.com"},
            {n: "Coinbase", type: "CEX", url: "https://www.coinbase.com"},
            {n: "Uniswap", type: "DEX", url: "https://app.uniswap.org"},
            {n: "PancakeSwap", type: "DEX", url: "https://pancakeswap.finance"}
        ];

        function filterExchanges(type) {
            const list = document.getElementById('exchange-list');
            list.innerHTML = '';
            exchanges.forEach(ex => {
                if (type === 'ALL' || ex.type === type) {
                    list.innerHTML += `<div class="card"><h3>${ex.n}</h3><a href="${ex.url}" target="_blank">Visit Site</a></div>`;
                }
            });
        }
        filterExchanges('ALL');

        const ulkeler = [ {n: "Turkey", nf: "87.9M", p: "1.06%", a: "769.6K"}, {n: "USA", nf: "349M", p: "4.20%", a: "9.1M"} ];
        function filtrele() {
            const aranan = document.getElementById('arama').value.toLowerCase();
            const liste = document.getElementById('liste');
            liste.innerHTML = '';
            ulkeler.filter(u => u.n.toLowerCase().includes(aranan)).forEach(u => {
                liste.innerHTML += `<div class="card"><h3>${u.n}</h3><p>Pop: ${u.nf}</p></div>`;
            });
        }
        filtrele();
    </script>
</body>
</html>
